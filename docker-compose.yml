services:
  mariadb:
    image: mariadb:10.6
    container_name: inventory-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: inventory
      MARIADB_USER: inventory_user
      MARIADB_PASSWORD: strong_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: